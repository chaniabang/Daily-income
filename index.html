<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="생산계산기">
<meta name="theme-color" content="#0f1117">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>일일 생산 계산기</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600;700&display=swap');

:root {
  --bg:       #0f1117;
  --s1:       #1a1d27;
  --s2:       #22263a;
  --border:   #2e3348;
  --blue:     #4f8eff;
  --green:    #00d4aa;
  --danger:   #ff5b5b;
  --text:     #e8eaf6;
  --muted:    #8891b2;
  --gold:     #ffd166;
  --orange:   #ff9f43;
  --r:        14px;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}

/* ── NAV TABS ── */
.tabs{display:flex;background:var(--s1);border-bottom:1px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:13px 4px 11px;text-align:center;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:3px}
.tab .ticon{font-size:19px}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}

/* ── PAGES ── */
.page{display:none;flex-direction:column;flex:1;overflow:hidden}
.page.active{display:flex}

/* ═══════════════════════════════════
   PAGE 1 — 일일 계산기
═══════════════════════════════════ */
.calc-header{background:var(--s1);padding:14px 14px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.calc-header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.app-title{font-size:17px;font-weight:900;display:flex;align-items:center;gap:7px}
.btn-sm{background:var(--s2);border:1px solid var(--border);color:var(--muted);padding:7px 12px;border-radius:8px;font-size:12px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .15s}
.btn-sm:active{transform:scale(.95);background:var(--blue);color:#fff;border-color:var(--blue)}

.date-row{display:flex;align-items:center;gap:8px}
.lbl{font-size:11px;color:var(--muted);white-space:nowrap}
.date-inp{background:var(--s2);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:8px;font-size:14px;font-family:'Noto Sans KR',sans-serif;flex:1}
.date-inp:focus{outline:none;border-color:var(--blue)}

/* TOTAL BANNER */
.total-bar{margin:10px 14px 0;background:linear-gradient(135deg,#1e3a5f,#0f2744);border:1px solid rgba(79,142,255,.3);border-radius:var(--r);padding:13px 16px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.total-lbl{font-size:11px;color:var(--muted);margin-bottom:3px}
.total-num{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;color:var(--blue);letter-spacing:-1px}
.count-num{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--green)}
.tr{text-align:right}

/* COL HEADER */
.col-head{display:grid;grid-template-columns:28px 1fr 78px 78px 96px 36px;gap:5px;padding:7px 14px;font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.4px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0}

/* SCROLL AREA */
.rows-scroll{flex:1;overflow-y:auto;padding:8px 14px 0;-webkit-overflow-scrolling:touch}

.row-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);margin-bottom:7px;transition:border-color .2s}
.row-card.filled{border-color:rgba(79,142,255,.28)}
.row-inner{display:grid;grid-template-columns:28px 1fr 78px 78px 96px 36px;gap:5px;align-items:center;padding:9px 10px}

.row-no{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--muted);text-align:center;font-weight:700}
.row-card.filled .row-no{color:var(--blue)}

.sel{background:var(--s2);border:1px solid var(--border);color:var(--text);padding:7px 8px;border-radius:8px;font-size:13px;font-family:'Noto Sans KR',sans-serif;width:100%;appearance:none;-webkit-appearance:none;cursor:pointer}
.sel:focus{outline:none;border-color:var(--blue)}

.uprice{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);text-align:center;background:var(--bg);border-radius:6px;padding:7px 3px}

.qty-inp{background:var(--s2);border:1px solid var(--border);color:var(--text);padding:7px 6px;border-radius:8px;font-size:13px;font-family:'JetBrains Mono',monospace;width:100%;text-align:center}
.qty-inp:focus{outline:none;border-color:var(--green)}
.qty-inp::placeholder{color:var(--muted);font-size:11px}

.amt{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--gold);text-align:right}
.amt.z{color:var(--muted)}

.del-btn{background:none;border:none;color:var(--muted);font-size:17px;cursor:pointer;padding:5px;border-radius:6px;display:flex;align-items:center;justify-content:center}
.del-btn:active{background:rgba(255,91,91,.15);color:var(--danger)}

.add-row-btn{background:var(--s1);border:1px dashed var(--border);color:var(--muted);border-radius:var(--r);padding:12px;font-size:13px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:7px;margin:4px 0 16px;transition:all .2s}
.add-row-btn:active{border-color:var(--blue);color:var(--blue)}

/* BOTTOM BAR */
.bot-bar{background:var(--s1);border-top:1px solid var(--border);padding:10px 14px;display:flex;gap:8px;flex-shrink:0}
.btn-main{flex:1;padding:13px;border-radius:10px;font-size:14px;font-family:'Noto Sans KR',sans-serif;font-weight:700;cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s}
.btn-save{background:var(--blue);color:#fff}
.btn-save:active{background:#3a7ae0;transform:scale(.97)}
.btn-load{background:var(--s2);border:1px solid var(--border);color:var(--text)}
.btn-load:active{transform:scale(.97)}
.btn-reset{background:rgba(255,91,91,.1);border:1px solid rgba(255,91,91,.25);color:var(--danger);flex:.55}
.btn-reset:active{transform:scale(.97)}

/* ═══════════════════════════════════
   PAGE 2 — 월별 현황
═══════════════════════════════════ */
.month-header{background:var(--s1);padding:14px;border-bottom:1px solid var(--border);flex-shrink:0}
.month-nav{display:flex;align-items:center;justify-content:space-between}
.month-title{font-size:18px;font-weight:900}
.nav-btn{background:var(--s2);border:1px solid var(--border);color:var(--text);width:38px;height:38px;border-radius:9px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.nav-btn:active{background:var(--blue);border-color:var(--blue)}

/* MONTH SUMMARY CARDS */
.month-summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:12px 14px 0;flex-shrink:0}
.sum-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:12px 10px;text-align:center}
.sum-card-lbl{font-size:10px;color:var(--muted);margin-bottom:5px}
.sum-card-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700}
.sum-card-val.blue{color:var(--blue)}
.sum-card-val.gold{color:var(--gold)}
.sum-card-val.green{color:var(--green)}

/* CALENDAR */
.cal-wrap{flex:1;overflow-y:auto;padding:10px 14px 16px;-webkit-overflow-scrolling:touch}
.cal-grid-head{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px}
.cal-dow{text-align:center;font-size:10px;font-weight:700;color:var(--muted);padding:4px 0}
.cal-dow:first-child{color:#ff7675}
.cal-dow:last-child{color:#74b9ff}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-cell{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:6px 4px;min-height:64px;cursor:pointer;transition:all .15s;position:relative}
.cal-cell:active{transform:scale(.96)}
.cal-cell.empty{background:transparent;border-color:transparent;cursor:default}
.cal-cell.empty:active{transform:none}
.cal-cell.today{border-color:rgba(79,142,255,.5)}
.cal-cell.has-data{background:var(--s2);border-color:rgba(79,142,255,.3)}
.cal-cell.selected{border-color:var(--blue);background:rgba(79,142,255,.12)}

.cal-day{font-size:12px;font-weight:700;margin-bottom:3px;text-align:center}
.cal-cell.empty .cal-day{color:transparent}
.sun .cal-day{color:#ff7675}
.sat .cal-day{color:#74b9ff}
.cal-cell.today .cal-day{color:var(--blue)}

.cal-amt{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--gold);text-align:center;line-height:1.3;font-weight:600}
.cal-items{font-size:9px;color:var(--muted);text-align:center}
.cal-dot{width:5px;height:5px;border-radius:50%;background:var(--green);margin:3px auto 0}

/* DAY DETAIL PANEL */
.day-detail{background:var(--s2);border-top:1px solid var(--border);padding:14px;flex-shrink:0;transition:all .2s;max-height:0;overflow:hidden;opacity:0}
.day-detail.open{max-height:280px;opacity:1;overflow-y:auto}
.detail-title{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.detail-table{width:100%;border-collapse:collapse;font-size:12px}
.detail-table th{color:var(--muted);font-weight:600;padding:4px 8px;text-align:left;border-bottom:1px solid var(--border)}
.detail-table td{padding:7px 8px;border-bottom:1px solid rgba(46,51,72,.5)}
.detail-table tr:last-child td{border-bottom:none}
.detail-total{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.detail-total-lbl{font-size:13px;color:var(--muted)}
.detail-total-val{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:var(--gold)}

/* ═══════════════════════════════════
   PAGE 3 — 단가 수정
═══════════════════════════════════ */
.price-header{background:var(--s1);padding:14px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.page-title{font-size:17px;font-weight:900}
.price-scroll{flex:1;overflow-y:auto;padding:10px 14px;-webkit-overflow-scrolling:touch}

.price-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px}
.price-row-inner{display:flex;align-items:center;gap:10px;padding:12px 14px}
.price-badge{background:rgba(79,142,255,.15);border:1px solid rgba(79,142,255,.3);color:var(--blue);font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;padding:6px 10px;border-radius:8px;min-width:52px;text-align:center}
.price-name{flex:1;font-size:13px;color:var(--muted)}
.price-inp{background:var(--s2);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:15px;width:96px;text-align:right}
.price-inp:focus{outline:none;border-color:var(--blue)}
.price-unit{font-size:11px;color:var(--muted);margin-left:2px}
.del-prod-btn{background:rgba(255,91,91,.08);border:1px solid rgba(255,91,91,.2);color:var(--danger);width:32px;height:32px;border-radius:8px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.del-prod-btn:active{background:rgba(255,91,91,.25)}

.add-prod-section{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-top:4px}
.add-prod-title{font-size:12px;color:var(--muted);font-weight:700;margin-bottom:10px;letter-spacing:.5px}
.add-prod-fields{display:flex;gap:8px;margin-bottom:10px}
.add-inp{background:var(--s2);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:14px;flex:1}
.add-inp:focus{outline:none;border-color:var(--blue)}
.add-inp::placeholder{color:var(--muted)}
.btn-add-prod{background:var(--green);color:#000;border:none;padding:10px 16px;border-radius:8px;font-size:13px;font-family:'Noto Sans KR',sans-serif;font-weight:700;cursor:pointer;white-space:nowrap}
.btn-add-prod:active{opacity:.8}

.price-save-bar{padding:12px 14px;border-top:1px solid var(--border);flex-shrink:0}
.btn-price-save{background:var(--blue);color:#fff;border:none;padding:14px;border-radius:10px;font-size:15px;font-family:'Noto Sans KR',sans-serif;font-weight:700;cursor:pointer;width:100%}
.btn-price-save:active{background:#3a7ae0}

/* ── MODALS ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:400;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.open{opacity:1;pointer-events:all}
.sheet{background:var(--s1);border-radius:20px 20px 0 0;width:100%;padding:18px 14px 40px;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);max-height:88vh;display:flex;flex-direction:column}
.overlay.open .sheet{transform:translateY(0)}
.handle{width:38px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px}
.sheet-title{font-size:17px;font-weight:900;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.sheet-close{background:var(--s2);border:none;color:var(--muted);width:30px;height:30px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sheet-scroll{overflow-y:auto;flex:1}

/* SAVED LIST */
.saved-item{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:13px 14px;margin-bottom:7px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:border-color .15s}
.saved-item:active{border-color:var(--blue)}
.saved-date-lbl{font-size:14px;font-weight:700}
.saved-meta{font-size:11px;color:var(--muted);margin-top:3px}
.saved-right{text-align:right}
.saved-total{font-family:'JetBrains Mono',monospace;color:var(--gold);font-weight:700;font-size:14px}
.saved-del-btn{background:none;border:none;color:var(--muted);font-size:17px;padding:4px 8px;cursor:pointer;border-radius:6px;margin-left:6px}
.saved-del-btn:active{color:var(--danger)}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-icon{font-size:42px;margin-bottom:10px}

/* TOAST */
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(16px);background:#1b3a2b;border:1px solid var(--green);color:var(--green);padding:9px 20px;border-radius:30px;font-size:13px;font-weight:700;z-index:600;opacity:0;transition:all .3s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* INSTALL BANNER */
.install-banner{background:linear-gradient(135deg,#1e3a1e,#0f2618);border-bottom:1px solid rgba(0,212,170,.3);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;cursor:pointer}
.install-text{flex:1;font-size:12px;color:var(--green)}
.install-text strong{display:block;font-size:13px}
.install-btn{background:var(--green);color:#000;border:none;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;white-space:nowrap}
.install-dismiss{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer}
.hidden{display:none!important}

input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
</style>
</head>
<body>

<!-- INSTALL BANNER -->
<div class="install-banner hidden" id="installBanner">
  <span style="font-size:22px">📲</span>
  <div class="install-text">
    <strong>홈 화면에 앱 설치</strong>
    오프라인에서도 사용 가능합니다
  </div>
  <button class="install-btn" id="installBtn">설치</button>
  <button class="install-dismiss" onclick="dismissInstall()">✕</button>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="switchPage('calc')" id="tab-calc">
    <span class="ticon">🏭</span>일일계산
  </div>
  <div class="tab" onclick="switchPage('month')" id="tab-month">
    <span class="ticon">📅</span>월별현황
  </div>
  <div class="tab" onclick="switchPage('price')" id="tab-price">
    <span class="ticon">⚙️</span>단가수정
  </div>
</div>

<!-- ═══ PAGE 1: 일일계산기 ═══ -->
<div class="page active" id="page-calc">
  <div class="calc-header">
    <div class="calc-header-top">
      <div class="app-title">🏭 일일 생산 계산기</div>
      <button class="btn-sm" onclick="openLoadModal()">📂 불러오기</button>
    </div>
    <div class="date-row">
      <span class="lbl">📅 작업일</span>
      <input type="date" class="date-inp" id="workDate">
    </div>
  </div>

  <div class="total-bar">
    <div>
      <div class="total-lbl">💰 총 생산 금액</div>
      <div class="total-num" id="totalAmt">0 원</div>
    </div>
    <div class="tr">
      <div class="total-lbl">입력 품목</div>
      <div class="count-num" id="itemCnt">0 <span style="font-size:13px;color:var(--muted)">품목</span></div>
    </div>
  </div>

  <div class="col-head">
    <div>No</div><div>제품</div>
    <div style="text-align:center">단가</div>
    <div style="text-align:center">수량</div>
    <div style="text-align:right">금액</div>
    <div></div>
  </div>

  <div class="rows-scroll" id="rowsContainer"></div>

  <div style="padding:0 14px">
    <button class="add-row-btn" onclick="addRow()">＋ 행 추가</button>
  </div>

  <div class="bot-bar">
    <button class="btn-main btn-load" onclick="openLoadModal()">📂 불러오기</button>
    <button class="btn-main btn-save" onclick="saveData()">💾 저장</button>
    <button class="btn-main btn-reset" onclick="resetRows()">🗑</button>
  </div>
</div>

<!-- ═══ PAGE 2: 월별현황 ═══ -->
<div class="page" id="page-month">
  <div class="month-header">
    <div class="month-nav">
      <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
      <div class="month-title" id="monthTitle"></div>
      <button class="nav-btn" onclick="changeMonth(1)">›</button>
    </div>
  </div>

  <div class="month-summary" id="monthSummary"></div>

  <div class="cal-wrap" id="calWrap">
    <div class="cal-grid-head">
      <div class="cal-dow">일</div><div class="cal-dow">월</div>
      <div class="cal-dow">화</div><div class="cal-dow">수</div>
      <div class="cal-dow">목</div><div class="cal-dow">금</div>
      <div class="cal-dow">토</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <div class="day-detail" id="dayDetail"></div>
</div>

<!-- ═══ PAGE 3: 단가수정 ═══ -->
<div class="page" id="page-price">
  <div class="price-header">
    <div class="page-title">⚙️ 단가 수정</div>
    <div style="font-size:11px;color:var(--muted)">저장 버튼을 눌러야 적용됩니다</div>
  </div>

  <div class="price-scroll" id="priceList"></div>

  <div style="padding:0 14px 10px">
    <div class="add-prod-section">
      <div class="add-prod-title">+ 새 제품 추가</div>
      <div class="add-prod-fields">
        <input type="text" class="add-inp" id="newNum" placeholder="제품번호" inputmode="decimal" style="max-width:100px">
        <input type="number" class="add-inp" id="newPrice" placeholder="단가 (원)" inputmode="decimal" step="0.01">
      </div>
      <button class="btn-add-prod" onclick="addProduct()" style="width:100%">＋ 추가</button>
    </div>
  </div>

  <div class="price-save-bar">
    <button class="btn-price-save" onclick="savePrices()">✅ 단가 저장 및 적용</button>
  </div>
</div>

<!-- ── LOAD MODAL ── -->
<div class="overlay" id="loadOverlay">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-title">
      📂 저장된 기록
      <button class="sheet-close" onclick="closeOverlay('loadOverlay')">✕</button>
    </div>
    <div class="sheet-scroll" id="savedList"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ═══ STATE ═══
const DEFAULT_PRODUCTS = [
  {num:'50',price:50},{num:'60',price:60},{num:'70',price:70},
  {num:'72',price:72},{num:'80',price:80},{num:'82',price:82},
  {num:'90',price:90},{num:'92',price:92},{num:'95',price:95},
];

let products = JSON.parse(localStorage.getItem('products') || 'null') || DEFAULT_PRODUCTS;
let editProds = [];
let rows = [];
let rowId = 0;
let viewYear, viewMonth;
let selectedDay = null;

// ═══ INIT ═══
(function(){
  const now = new Date();
  viewYear = now.getFullYear();
  viewMonth = now.getMonth();
  const y = now.getFullYear(), m = String(now.getMonth()+1).padStart(2,'0'), d = String(now.getDate()).padStart(2,'0');
  document.getElementById('workDate').value = `${y}-${m}-${d}`;
  document.getElementById('workDate').addEventListener('change', function(){
    const dateStr = this.value;
    if(!dateStr) return;
    const rec = getRecords().find(r=>r.date===dateStr);
    if(rec){
      if(!confirm(dateStr+' 저장된 데이터가 있습니다. 불러올까요?')) return;
      rows=[]; rowId=0;
      document.getElementById('rowsContainer').innerHTML='';
      rec.data.forEach(r=>{
        const id=rowId++;
        rows.push({id,prodNum:r.prodNum,qty:r.qty});
        const c=document.getElementById('rowsContainer');
        const div=document.createElement('div');
        div.className='row-card filled';
        div.id=`rc-${id}`;
        div.innerHTML=buildRowHTML(id,rows.length);
        c.appendChild(div);
      });
      const fill=Math.max(0,5-rows.length);
      for(let i=0;i<fill;i++) addRow();
      updateTotal();
      toast('📂 '+dateStr+' 불러옴');
    }
  });
  for(let i=0;i<10;i++) addRow();
  renderPriceList();
  renderCalendar();
  setupInstall();
})();

// ═══ PAGE SWITCH ═══
function switchPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='month'){renderCalendar();}
  if(name==='price'){renderPriceList();}
}

// ═══════════════════
// PAGE 1 — CALC
// ═══════════════════
function addRow(){
  const id = rowId++;
  rows.push({id, prodNum:'', qty:''});
  const c = document.getElementById('rowsContainer');
  const div = document.createElement('div');
  div.className = 'row-card';
  div.id = `rc-${id}`;
  div.innerHTML = buildRowHTML(id, rows.length);
  c.appendChild(div);
  updateTotal();
}

function buildRowHTML(id, num){
  const r = rows.find(x=>x.id===id);
  const opts = products.map(p=>`<option value="${p.num}"${r.prodNum===p.num?' selected':''}>${p.num}</option>`).join('');
  const amt = calcAmt(r.prodNum, r.qty);
  return `
  <div class="row-inner">
    <div class="row-no">${num}</div>
    <div><select class="sel" onchange="onProd(${id},this.value)">
      <option value="">--</option>${opts}
    </select></div>
    <div class="uprice" id="up-${id}">${priceDisp(r.prodNum)}</div>
    <div><input type="number" class="qty-inp" placeholder="수량" value="${r.qty}"
      inputmode="numeric" oninput="onQty(${id},this.value)"></div>
    <div class="amt${amt===0?' z':''}" id="am-${id}">${fmtAmt(amt)}</div>
    <button class="del-btn" onclick="delRow(${id})">✕</button>
  </div>`;
}

function rerenderRows(){
  const c = document.getElementById('rowsContainer');
  c.innerHTML = '';
  rows.forEach((r,i)=>{
    const div = document.createElement('div');
    div.className = 'row-card'+(r.prodNum&&r.qty?' filled':'');
    div.id = `rc-${r.id}`;
    div.innerHTML = buildRowHTML(r.id, i+1);
    c.appendChild(div);
  });
  updateTotal();
}

function onProd(id, val){
  const r = rows.find(x=>x.id===id);
  r.prodNum = val;
  const el = document.getElementById(`up-${id}`);
  if(el) el.textContent = priceDisp(val);
  updateAmt(id);
  updateStyle(id);
  updateTotal();
}

function onQty(id, val){
  const r = rows.find(x=>x.id===id);
  r.qty = val;
  updateAmt(id);
  updateStyle(id);
  updateTotal();
}

function updateAmt(id){
  const r = rows.find(x=>x.id===id);
  const amt = calcAmt(r.prodNum, r.qty);
  const el = document.getElementById(`am-${id}`);
  if(el){el.textContent=fmtAmt(amt);el.className='amt'+(amt===0?' z':'');}
}

function updateStyle(id){
  const r = rows.find(x=>x.id===id);
  const el = document.getElementById(`rc-${id}`);
  if(el){
    if(r.prodNum&&r.qty&&Number(r.qty)>0) el.classList.add('filled');
    else el.classList.remove('filled');
  }
}

function delRow(id){
  rows = rows.filter(x=>x.id!==id);
  rerenderRows();
}

function resetRows(){
  if(!confirm('모든 입력을 초기화할까요?')) return;
  rows=[]; rowId=0;
  document.getElementById('rowsContainer').innerHTML='';
  for(let i=0;i<10;i++) addRow();
  updateTotal();
  toast('초기화되었습니다');
}

function updateTotal(){
  let total=0, cnt=0;
  rows.forEach(r=>{
    const a=calcAmt(r.prodNum,r.qty);
    if(a>0){total+=a;cnt++;}
  });
  document.getElementById('totalAmt').textContent = fmtN(total)+' 원';
  document.getElementById('itemCnt').innerHTML = cnt+' <span style="font-size:13px;color:var(--muted)">품목</span>';
}

// ═══ SAVE / LOAD ═══
function saveData(){
  const date = document.getElementById('workDate').value;
  if(!date){alert('날짜를 선택해주세요.');return;}
  const data = rows.filter(r=>r.prodNum&&r.qty&&Number(r.qty)>0)
                   .map(r=>({prodNum:r.prodNum,qty:r.qty}));
  if(!data.length){toast('저장할 데이터가 없습니다');return;}

  const saved = getRecords();
  const idx = saved.findIndex(s=>s.date===date);
  const rec = {date, data, savedAt:new Date().toISOString()};
  if(idx>=0){
    if(!confirm(`${date} 기록이 이미 있습니다. 덮어쓸까요?`)) return;
    saved[idx]=rec;
  } else { saved.unshift(rec); }
  setRecords(saved);
  toast('✅ '+date+' 저장 완료!');
}

function openLoadModal(){
  const saved = getRecords();
  const c = document.getElementById('savedList');
  if(!saved.length){
    c.innerHTML='<div class="empty"><div class="empty-icon">📭</div>저장된 기록이 없습니다</div>';
  } else {
    c.innerHTML = saved.map((s,i)=>{
      const total = s.data.reduce((a,r)=>a+calcAmt(r.prodNum,r.qty),0);
      const t = new Date(s.savedAt).toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
      return `<div class="saved-item" onclick="loadRec(${i})">
        <div>
          <div class="saved-date-lbl">📅 ${s.date}</div>
          <div class="saved-meta">${s.data.length}품목 · ${t}</div>
        </div>
        <div class="saved-right">
          <div class="saved-total">${fmtN(total)}원</div>
        </div>
        <button class="saved-del-btn" onclick="event.stopPropagation();delRec(${i})">🗑</button>
      </div>`;
    }).join('');
  }
  openOverlay('loadOverlay');
}

function loadRec(i){
  const saved = getRecords();
  const rec = saved[i];
  if(!rec) return;
  rows=[]; rowId=0;
  document.getElementById('rowsContainer').innerHTML='';
  document.getElementById('workDate').value=rec.date;
  rec.data.forEach(r=>{
    const id=rowId++;
    rows.push({id,prodNum:r.prodNum,qty:r.qty});
    const c=document.getElementById('rowsContainer');
    const div=document.createElement('div');
    div.className='row-card filled';
    div.id=`rc-${id}`;
    div.innerHTML=buildRowHTML(id,rows.length);
    c.appendChild(div);
  });
  const fill=Math.max(0,5-rows.length);
  for(let i=0;i<fill;i++) addRow();
  updateTotal();
  closeOverlay('loadOverlay');
  toast('📂 '+rec.date+' 불러옴');
}

function delRec(i){
  if(!confirm('이 기록을 삭제할까요?')) return;
  const saved=getRecords();
  saved.splice(i,1);
  setRecords(saved);
  openLoadModal();
}

// ═══════════════════
// PAGE 2 — MONTHLY
// ═══════════════════
function changeMonth(d){
  viewMonth += d;
  if(viewMonth>11){viewMonth=0;viewYear++;}
  if(viewMonth<0){viewMonth=11;viewYear--;}
  selectedDay=null;
  document.getElementById('dayDetail').classList.remove('open');
  renderCalendar();
}

function renderCalendar(){
  const yr=viewYear, mo=viewMonth;
  document.getElementById('monthTitle').textContent = `${yr}년 ${mo+1}월`;
  const saved=getRecords();

  // Build day map
  const dayMap={};
  saved.forEach(r=>{
    const [y,m] = r.date.split('-').map(Number);
    if(y===yr&&m===mo+1){
      const d=Number(r.date.split('-')[2]);
      const total=r.data.reduce((a,x)=>a+calcAmt(x.prodNum,x.qty),0);
      dayMap[d]={total,items:r.data.length,date:r.date};
    }
  });

  // Summary
  const days=Object.values(dayMap);
  const workDays=days.length;
  const monthTotal=days.reduce((a,d)=>a+d.total,0);
  const avgDay=workDays?Math.round(monthTotal/workDays):0;
  document.getElementById('monthSummary').innerHTML=`
    <div class="sum-card">
      <div class="sum-card-lbl">작업일수</div>
      <div class="sum-card-val blue">${workDays}일</div>
    </div>
    <div class="sum-card">
      <div class="sum-card-lbl">월 총계</div>
      <div class="sum-card-val gold" style="font-size:11px">${fmtN(monthTotal)}원</div>
    </div>
    <div class="sum-card">
      <div class="sum-card-lbl">일 평균</div>
      <div class="sum-card-val green" style="font-size:11px">${fmtN(avgDay)}원</div>
    </div>`;

  // Calendar
  const first = new Date(yr,mo,1).getDay();
  const lastDay = new Date(yr,mo+1,0).getDate();
  const today = new Date();
  const grid = document.getElementById('calGrid');
  grid.innerHTML='';

  for(let i=0;i<first;i++){
    const el=document.createElement('div');
    el.className='cal-cell empty';
    el.innerHTML='<div class="cal-day">0</div>';
    grid.appendChild(el);
  }
  for(let d=1;d<=lastDay;d++){
    const dow=(first+d-1)%7;
    const info=dayMap[d];
    const dateStr=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=today.getFullYear()===yr&&today.getMonth()===mo&&today.getDate()===d;
    const isSel=selectedDay===dateStr;
    const el=document.createElement('div');
    el.className='cal-cell'
      +(dow===0?' sun':dow===6?' sat':'')
      +(isToday?' today':'')
      +(info?' has-data':'')
      +(isSel?' selected':'');
    el.innerHTML=`<div class="cal-day">${d}</div>`
      +(info?`<div class="cal-amt">${fmtK(info.total)}</div><div class="cal-items">${info.items}품목</div><div class="cal-dot"></div>`:'');
    el.onclick=()=>selectDay(dateStr, info);
    el.ondblclick=()=>loadDateToCalc(dateStr);
    grid.appendChild(el);
  }
}

function selectDay(dateStr, info){
  const detail=document.getElementById('dayDetail');

  // 이미 선택된 날짜 다시 클릭 → 닫기
  if(selectedDay===dateStr){
    selectedDay=null;
    detail.classList.remove('open');
    renderCalendar();
    return;
  }

  selectedDay=dateStr;
  renderCalendar();

  const rec=getRecords().find(r=>r.date===dateStr);

  // 저장 데이터 없는 날짜 → 안내 패널
  if(!rec){
    detail.innerHTML=`
      <div class="detail-title">
        📋 ${dateStr}
        <button onclick="loadDateToCalc('${dateStr}')" style="background:var(--blue);color:#fff;border:none;padding:6px 12px;border-radius:8px;font-size:12px;font-family:'Noto Sans KR',sans-serif;font-weight:700;cursor:pointer">✏️ 계산기로 열기</button>
      </div>
      <div style="text-align:center;padding:14px 0;color:var(--muted);font-size:13px">
        저장된 데이터가 없습니다<br>
        <span style="font-size:11px;opacity:.7">더블탭하면 계산기로 바로 이동합니다</span>
      </div>`;
    detail.classList.add('open');
    return;
  }

  const total=rec.data.reduce((a,r)=>a+calcAmt(r.prodNum,r.qty),0);
  const rows_html=rec.data.map(r=>{
    const p=products.find(x=>x.num===r.prodNum);
    const amt=calcAmt(r.prodNum,r.qty);
    return `<tr>
      <td style="color:var(--blue);font-family:'JetBrains Mono',monospace;font-weight:700">${r.prodNum}</td>
      <td style="text-align:center">${p?p.price:'-'}</td>
      <td style="text-align:center;font-family:'JetBrains Mono',monospace">${fmtN(Number(r.qty))}</td>
      <td style="text-align:right;color:var(--gold);font-family:'JetBrains Mono',monospace">${fmtN(amt)}</td>
    </tr>`;
  }).join('');

  detail.innerHTML=`
    <div class="detail-title">
      📋 ${dateStr}
      <button onclick="loadDateToCalc('${dateStr}')" style="background:var(--blue);color:#fff;border:none;padding:6px 12px;border-radius:8px;font-size:12px;font-family:'Noto Sans KR',sans-serif;font-weight:700;cursor:pointer">✏️ 계산기로 열기</button>
    </div>
    <table class="detail-table">
      <thead><tr>
        <th>제품</th><th style="text-align:center">단가</th>
        <th style="text-align:center">수량</th><th style="text-align:right">금액</th>
      </tr></thead>
      <tbody>${rows_html}</tbody>
    </table>
    <div class="detail-total">
      <span class="detail-total-lbl">합계</span>
      <span class="detail-total-val">${fmtN(total)} 원</span>
    </div>`;
  detail.classList.add('open');
}

function loadDateToCalc(dateStr){
  rows=[]; rowId=0;
  document.getElementById('rowsContainer').innerHTML='';
  document.getElementById('workDate').value=dateStr;

  const rec=getRecords().find(r=>r.date===dateStr);
  if(rec){
    // 저장된 데이터 있음 → 불러오기
    rec.data.forEach(r=>{
      const id=rowId++;
      rows.push({id,prodNum:r.prodNum,qty:r.qty});
      const c=document.getElementById('rowsContainer');
      const div=document.createElement('div');
      div.className='row-card filled';
      div.id=`rc-${id}`;
      div.innerHTML=buildRowHTML(id,rows.length);
      c.appendChild(div);
    });
    const fill=Math.max(0,5-rows.length);
    for(let i=0;i<fill;i++) addRow();
    toast('📂 '+dateStr+' 불러옴');
  } else {
    // 저장 없음 → 빈 10줄로 초기화
    for(let i=0;i<10;i++) addRow();
    toast('📝 '+dateStr+' 새로 작성');
  }

  updateTotal();
  switchPage('calc');
}

// ═══════════════════
// PAGE 3 — PRICES
// ═══════════════════
function renderPriceList(){
  editProds = products.map(p=>({...p}));
  _renderPriceHTML();
}

function _renderPriceHTML(){
  const c=document.getElementById('priceList');
  c.innerHTML=editProds.map((p,i)=>`
    <div class="price-card">
      <div class="price-row-inner">
        <div class="price-badge">${p.num}</div>
        <div class="price-name">제품 ${p.num}</div>
        <input type="number" class="price-inp" value="${p.price}" step="0.01"
          inputmode="decimal" onchange="editProds[${i}].price=parseFloat(this.value)||0">
        <span class="price-unit">원</span>
        <button class="del-prod-btn" onclick="removeP(${i})">✕</button>
      </div>
    </div>`).join('');
}

function removeP(i){
  editProds.splice(i,1);
  _renderPriceHTML();
}

function addProduct(){
  const n=document.getElementById('newNum').value.trim();
  const p=parseFloat(document.getElementById('newPrice').value);
  if(!n||isNaN(p)||p<=0){alert('제품번호와 단가를 올바르게 입력하세요.');return;}
  if(editProds.find(x=>x.num===n)){alert('이미 존재하는 제품번호입니다.');return;}
  editProds.push({num:n,price:p});
  editProds.sort((a,b)=>parseFloat(a.num)-parseFloat(b.num));
  _renderPriceHTML();
  document.getElementById('newNum').value='';
  document.getElementById('newPrice').value='';
}

function savePrices(){
  // Sync inputs
  document.querySelectorAll('.price-inp').forEach((el,i)=>{
    if(editProds[i]) editProds[i].price=parseFloat(el.value)||0;
  });
  products=[...editProds];
  localStorage.setItem('products',JSON.stringify(products));
  rerenderRows();
  toast('✅ 단가 저장 완료!');
}

// ═══ HELPERS ═══
function calcAmt(pn, qty){
  if(!pn||!qty||isNaN(qty)||Number(qty)<=0) return 0;
  const p=products.find(x=>x.num===pn);
  if(!p) return 0;
  return Math.round(p.price*Number(qty)*100)/100;
}
function priceDisp(pn){
  const p=products.find(x=>x.num===pn);
  return p?p.price.toLocaleString('ko-KR',{maximumFractionDigits:2}):'-';
}
function fmtAmt(a){return a===0?'-':fmtN(a)+'원';}
function fmtN(n){return Math.round(n).toLocaleString('ko-KR');}
function fmtK(n){
  if(n>=100000000) return (n/100000000).toFixed(1)+'억';
  if(n>=10000000) return (n/10000000).toFixed(1)+'천만';
  if(n>=1000000) return (n/1000000).toFixed(1)+'백만';
  if(n>=10000) return (n/10000).toFixed(1)+'만';
  return fmtN(n);
}
function getRecords(){return JSON.parse(localStorage.getItem('records')||'[]');}
function setRecords(d){localStorage.setItem('records',JSON.stringify(d));}

// ═══ MODAL ═══
function openOverlay(id){document.getElementById(id).classList.add('open');}
function closeOverlay(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.overlay').forEach(o=>{
  o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');});
});

// ═══ TOAST ═══
let _tt;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2500);
}

// ═══ PWA INSTALL ═══
let deferredPrompt=null;
function setupInstall(){
  window.addEventListener('beforeinstallprompt',e=>{
    e.preventDefault();
    deferredPrompt=e;
    const dismissed=localStorage.getItem('installDismissed');
    if(!dismissed) document.getElementById('installBanner').classList.remove('hidden');
  });
  window.addEventListener('appinstalled',()=>{
    document.getElementById('installBanner').classList.add('hidden');
    toast('✅ 앱이 설치되었습니다!');
  });
  document.getElementById('installBtn').onclick=async()=>{
    if(!deferredPrompt) return;
    deferredPrompt.prompt();
    const {outcome}=await deferredPrompt.userChoice;
    if(outcome==='accepted') toast('앱 설치 중...');
    deferredPrompt=null;
    document.getElementById('installBanner').classList.add('hidden');
  };
}
function dismissInstall(){
  localStorage.setItem('installDismissed','1');
  document.getElementById('installBanner').classList.add('hidden');
}

// ═══ SW REGISTER ═══
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>
</body>
</html>
